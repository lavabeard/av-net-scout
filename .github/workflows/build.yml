name: Build

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  # ── Linux x64 build (Intel/AMD desktops & VMs) ──────────────────────────────
  build-linux-x64:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2
      - uses: actions/setup-node@v4.4.0
        with:
          node-version: '24'
      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential python3 libpcap-dev \
            libglib2.0-0 libglib2.0-dev \
            libgtk-3-0 libgtk-3-dev \
            libnss3 libnss3-dev \
            libatk1.0-0 libatk-bridge2.0-0 \
            libcups2 libdrm2 \
            libxkbcommon0 libxcomposite1 libxdamage1 \
            libxfixes3 libxrandr2 libgbm1 \
            libasound2t64 \
            libpango-1.0-0 libcairo2 \
            libnspr4 libx11-xcb1 libxcb-dri3-0 \
            ffmpeg
      # Native addons (cap, raw-socket) build for this runner's Node ABI.
      - run: npm ci
      # The privileged helper runs under plain Node, so bundle the exact Node
      # version that just built the native addons (matching ABI).
      - name: Bundle Node runtime for the helper
        run: |
          NODE_VER=$(node -v)
          curl -fsSL "https://nodejs.org/dist/${NODE_VER}/node-${NODE_VER}-linux-x64.tar.xz" -o /tmp/node.tar.xz
          tar -xf /tmp/node.tar.xz -C /tmp
          mkdir -p vendor
          cp "/tmp/node-${NODE_VER}-linux-x64/bin/node" vendor/node
          chmod +x vendor/node
          vendor/node -v
      - name: Build x64
        run: npx electron-builder --linux --x64 --publish never
      - name: Smoke test
        run: |
          file dist/*.AppImage | head -3
          dpkg-deb --info dist/*.deb | head -5
          echo "Smoke test passed."
      - uses: actions/upload-artifact@v4
        with:
          name: linux-x64
          path: |
            dist/*.AppImage
            dist/*.deb

  # ── Linux arm64 build (Parallels on Apple Silicon, Raspberry Pi, etc.) ──────
  # Native addons can't be cross-compiled, so build on a real arm64 runner.
  build-linux-arm64:
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4.2.2
      - uses: actions/setup-node@v4.4.0
        with:
          node-version: '24'
      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential python3 libpcap-dev \
            libglib2.0-0 libglib2.0-dev \
            libgtk-3-0 libgtk-3-dev \
            libnss3 libnss3-dev \
            libatk1.0-0 libatk-bridge2.0-0 \
            libcups2 libdrm2 \
            libxkbcommon0 libxcomposite1 libxdamage1 \
            libxfixes3 libxrandr2 libgbm1 \
            libasound2t64 \
            libpango-1.0-0 libcairo2 \
            libnspr4 libx11-xcb1 libxcb-dri3-0 \
            ffmpeg rpm fakeroot
      - run: npm ci
      - name: Bundle Node runtime for the helper
        run: |
          NODE_VER=$(node -v)
          curl -fsSL "https://nodejs.org/dist/${NODE_VER}/node-${NODE_VER}-linux-arm64.tar.xz" -o /tmp/node.tar.xz
          tar -xf /tmp/node.tar.xz -C /tmp
          mkdir -p vendor
          cp "/tmp/node-${NODE_VER}-linux-arm64/bin/node" vendor/node
          chmod +x vendor/node
          vendor/node -v
      - name: Build arm64
        run: npx electron-builder --linux --arm64 --publish never
      - name: Smoke test
        run: |
          file dist/*arm64*.AppImage | head -3
          dpkg-deb --info dist/*arm64*.deb | head -5
          echo "Smoke test passed."
      - uses: actions/upload-artifact@v4
        with:
          name: linux-arm64
          path: |
            dist/*arm64*.AppImage
            dist/*arm64*.deb

  # ── Release (tag pushes only) ────────────────────────────────────────────────
  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-linux-x64, build-linux-arm64]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist-artifacts
          merge-multiple: true
      - uses: softprops/action-gh-release@v2
        with:
          files: dist-artifacts/**
