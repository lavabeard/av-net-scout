name: Build

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  # ── Linux x64 build (standard desktops / VMs on Intel or AMD) ───────────────
  build-linux-x64:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2
      - uses: actions/setup-node@v4.4.0
        with:
          node-version: '24'
      - name: Install Electron build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libglib2.0-0 libglib2.0-dev \
            libgtk-3-0 libgtk-3-dev \
            libnss3 libnss3-dev \
            libatk1.0-0 libatk-bridge2.0-0 \
            libcups2 libdrm2 \
            libxkbcommon0 libxcomposite1 libxdamage1 \
            libxfixes3 libxrandr2 libgbm1 \
            libasound2t64 \
            libpango-1.0-0 libcairo2 \
            libnspr4 libx11-xcb1 libxcb-dri3-0 \
            ffmpeg
      - run: npm ci
      - name: Build x64
        run: npx electron-builder --linux --x64 --publish never
      - name: Smoke test
        run: |
          file dist/*.AppImage | head -3
          dpkg-deb --info dist/*.deb | head -5
          echo "Smoke test passed."
      - uses: actions/upload-artifact@v4
        with:
          name: linux-x64
          path: |
            dist/*.AppImage
            dist/*.deb

  # ── Linux arm64 cross-compile (Parallels on Apple Silicon, Raspberry Pi, etc.)
  # Runs on the standard x64 runner — electron-builder cross-compiles arm64
  build-linux-arm64:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2
      - uses: actions/setup-node@v4.4.0
        with:
          node-version: '24'
      - name: Install Electron build + cross-compile dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libglib2.0-0 libglib2.0-dev \
            libgtk-3-0 libgtk-3-dev \
            libnss3 libnss3-dev \
            libatk1.0-0 libatk-bridge2.0-0 \
            libcups2 libdrm2 \
            libxkbcommon0 libxcomposite1 libxdamage1 \
            libxfixes3 libxrandr2 libgbm1 \
            libasound2t64 \
            libpango-1.0-0 libcairo2 \
            libnspr4 libx11-xcb1 libxcb-dri3-0 \
            ffmpeg \
            rpm fakeroot
      - run: npm ci
      - name: Build arm64 (cross-compile)
        run: npx electron-builder --linux --arm64 --publish never
      - name: Smoke test
        run: |
          file dist/*arm64*.AppImage | head -3
          dpkg-deb --info dist/*arm64*.deb | head -5
          echo "Smoke test passed."
      - uses: actions/upload-artifact@v4
        with:
          name: linux-arm64
          path: |
            dist/*arm64*.AppImage
            dist/*arm64*.deb

  # ── Release (tag pushes only) ────────────────────────────────────────────────
  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-linux-x64, build-linux-arm64]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist-artifacts
          merge-multiple: true
      - uses: softprops/action-gh-release@v2
        with:
          files: dist-artifacts/**
